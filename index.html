<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FinanceFlow — NCS Finance Department</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"/>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6f9;--surf:#fff;--card:#fff;--card2:#f8f9fc;
  --bdr:#e2e8f0;--bdr2:#d0d7e3;
  --t1:#1a2236;--t2:#4a5568;--t3:#8a97ae;
  --or:#f5a623;--or-dim:#f5a62312;--or-bdr:#f5a62335;
  --dk:#2d3748;
  --em:#10b981;--am:#f59e0b;--rd:#ef4444;--bl:#3b82f6;
  --fd:'Syne',sans-serif;--fb:'DM Sans',sans-serif;--fm:'DM Mono',monospace;
}
body.dark{
  --bg:#0d1117;--surf:#161b22;--card:#161b22;--card2:#1c2333;
  --bdr:#30363d;--bdr2:#3d4451;
  --t1:#e6edf3;--t2:#8b949e;--t3:#484f58;
  --dk:#010409;
}
body.dark .tb{box-shadow:0 1px 0 var(--bdr)}
body.dark .cd,.dark .scd,.dark .pc,.dark .ttc,.dark .lc,.dark .mod{box-shadow:none}
body.dark .tr:hover{border-color:#f5a623!important;background:#1c2333!important}
body.dark .ip:focus{border-color:#f5a623;box-shadow:0 0 0 3px #f5a62325}
body.dark .bn.bpr{background:#f5a623;color:#0d1117}
body.dark .bn.bpr:hover{background:#e8941a}
body.dark select option{background:#161b22;color:#e6edf3}
body.dark .ni.ac{color:#f5a623;background:#f5a62318;border-left:3px solid #f5a623}
body.dark .fs{background:#1c2333;border-color:#30363d;color:#e6edf3}
body.dark .fs:focus{border-color:#f5a623}
body.dark .tb{border-bottom:1px solid #30363d}
body.dark .pt.at{border-color:#f5a623;color:#f5a623}
body.dark .stb.ast{background:#f5a62318}
body,*{transition:background-color .2s,border-color .2s,color .15s}
html,body,#root{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--t1);font-family:var(--fb);font-size:14px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#cbd5e0;border-radius:3px}
select option{background:var(--surf);color:var(--t1)}
button{font-family:var(--fb);cursor:pointer;border:none;background:none}
input,select,textarea{font-family:var(--fb);border:none;outline:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:.8;transform:scale(1.1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.fi{animation:fadeIn .25s ease forwards}
.si{animation:slideIn .3s ease forwards}
.sp{animation:spin 1s linear infinite;width:15px;height:15px;border:2.5px solid #f5a62335;border-top-color:var(--or);border-radius:50%;display:inline-block}
/* LAYOUT */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:236px;min-width:236px;background:var(--dk);display:flex;flex-direction:column;height:100vh}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}
/* SIDEBAR */
.logo-a{padding:18px 16px;border-bottom:1px solid #ffffff12;display:flex;align-items:center;gap:11px}
.logo-t{font-family:var(--fd);font-size:15px;font-weight:700;color:#fff;line-height:1.2}
.logo-s{font-size:10.5px;color:#f5a62399;margin-top:1px}
nav.snav{flex:1;padding:12px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.ni{display:flex;align-items:center;gap:10px;padding:9px 13px;border-radius:10px;font-size:13.5px;font-weight:500;color:#94a3b8;transition:all .15s;cursor:pointer;border:none;background:none;width:100%;text-align:left}
.ni:hover{color:#fff;background:#ffffff12}
.ni.ac{color:var(--or);background:#f5a62318;border-left:3px solid var(--or);padding-left:10px}
.sf{padding:12px 10px;border-top:1px solid #ffffff10}
.uc{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:#ffffff0a;margin-bottom:6px}
.un{font-size:12.5px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ur{font-size:10.5px;color:var(--or);margin-top:1px;font-weight:600}
.lb{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;font-size:13px;color:#64748b;transition:all .15s;cursor:pointer;border:none;background:none;width:100%}
.lb:hover{color:#ef4444;background:#ef444410}
/* TOPBAR */
.tb{height:56px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:var(--surf);flex-shrink:0;box-shadow:0 1px 3px #0000000a}
.ap{display:flex;align-items:center;gap:6px;font-size:12px;color:#dc2626;background:#fef2f2;border:1px solid #fecaca;padding:5px 12px;border-radius:20px;font-weight:600}
.dl{font-family:var(--fd);font-size:13px;font-weight:700;color:var(--dk)}
.ds{font-size:10.5px;color:var(--t3);text-align:right}
.tu{display:flex;align-items:center;gap:9px;padding:6px 12px;border-radius:10px;border:1px solid var(--bdr);background:var(--bg)}
/* AVATAR */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0;font-family:var(--fd)}
.avs{width:28px;height:28px;font-size:10px}
.avm{width:36px;height:36px;font-size:13px}
.avl{width:44px;height:44px;font-size:15px}
.a0{background:#f5a623}.a1{background:#6366f1}.a2{background:#10b981}.a3{background:#3b82f6}.a4{background:#8b5cf6}.a5{background:#ec4899}
/* BUTTONS */
.bn{display:inline-flex;align-items:center;gap:7px;font-weight:600;border:none;cursor:pointer;transition:all .15s;border-radius:9px;white-space:nowrap}
.bsm{padding:6px 13px;font-size:12.5px}
.bmd{padding:9px 18px;font-size:13.5px}
.blg{padding:12px 24px;font-size:14px;width:100%;justify-content:center}
.bpr{background:var(--or);color:#fff}.bpr:hover{background:#e8941a}
.bse{background:#fff;color:var(--t2);border:1px solid var(--bdr)}.bse:hover{background:var(--bg)}
.bda{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}.bda:hover{background:#fee2e2}
.bgh{color:var(--t3);background:none;padding:6px 10px}.bgh:hover{color:var(--t1);background:var(--bg)}
.bin{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}.bin:hover{background:#dbeafe}
.bn:disabled{opacity:.4;cursor:not-allowed}
/* FORM */
.fl{display:flex;flex-direction:column;gap:6px}
.fl label{font-size:11.5px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;display:block}
.ip{background:var(--surf);border:1.5px solid var(--bdr);color:var(--t1);border-radius:9px;padding:10px 14px;font-size:13.5px;font-family:var(--fb);transition:border-color .15s;width:100%;display:block}
.ip:focus{border-color:var(--or);box-shadow:0 0 0 3px var(--or-dim);outline:none}
.ip::placeholder{color:var(--t3)}
/* CARDS */
.cd{background:var(--surf);border:1.5px solid var(--bdr);border-radius:16px;box-shadow:0 1px 4px #0000000a}
/* BADGES */
.bg{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:6px;font-size:11.5px;font-weight:600;border:1px solid transparent}
.dov{background:#fef2f2;color:#dc2626;border-color:#fecaca}
.dtd{background:#fffbeb;color:#d97706;border-color:#fde68a}
.dsn{background:#fefce8;color:#a16207;border-color:#fef08a}
.ddn{background:#f0fdf4;color:#059669;border-color:#bbf7d0}
.dok{background:var(--bg);color:var(--t3);border-color:var(--bdr)}
/* SCREEN */
.sc{flex:1;overflow-y:auto;padding:32px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px}
.st{font-family:var(--fd);font-size:24px;font-weight:800;color:var(--t1)}
.ss{font-size:13px;color:var(--t3);margin-top:3px}
/* STATS */
.sgr{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:26px}
.scd{background:var(--surf);border:1.5px solid var(--bdr);border-radius:16px;padding:22px;position:relative;overflow:hidden;box-shadow:0 1px 4px #0000000a}
.sv{font-family:var(--fd);font-size:36px;font-weight:800;line-height:1;margin:6px 0 4px}
.sl{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
/* ALERTS */
.alr{display:flex;align-items:center;gap:10px;border-radius:12px;padding:11px 16px;font-size:13px;margin-bottom:8px;font-weight:500}
.alov{background:#fef2f2;border:1.5px solid #fecaca;color:#dc2626}
.altd{background:#fffbeb;border:1.5px solid #fde68a;color:#d97706}
/* DAILY PROMPT */
.dp{background:linear-gradient(135deg,#fffbeb,#fef3c7);border:2px solid #f59e0b;border-radius:14px;padding:16px 18px;margin-bottom:20px}
.dp-title{font-family:var(--fd);font-size:14px;font-weight:800;color:#92400e;margin-bottom:3px;display:flex;align-items:center;gap:8px}
.dp-sub{font-size:12.5px;color:#a16207;margin-bottom:12px}
/* TASK LIST */
.tgr{margin-bottom:24px}
.tgh{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:1.5px solid var(--bdr)}
.tgtl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.tgct{font-size:11px;color:var(--t3);background:var(--bg);padding:2px 9px;border-radius:20px;border:1px solid var(--bdr)}
.tr{display:flex;align-items:center;gap:14px;padding:13px 16px;background:var(--surf);border:1.5px solid var(--bdr);border-radius:12px;cursor:pointer;transition:all .15s;margin-bottom:6px;box-shadow:0 1px 3px #0000000a}
.tr:hover{border-color:var(--or);box-shadow:0 2px 8px #f5a62318}
.tr.sel{border-color:var(--or);background:#fff7ed}
.ttl{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:340px}
.tmt{display:flex;align-items:center;gap:8px;margin-top:3px;flex-wrap:wrap}
.tmi{font-size:11.5px;color:var(--t3)}
.trg{display:flex;align-items:center;gap:10px;flex-shrink:0;margin-left:auto}
/* FILTER BAR */
.fb{display:flex;align-items:center;gap:10px;padding:13px 20px;border-bottom:1px solid var(--bdr);background:var(--surf);flex-wrap:wrap}
.fs{background:var(--surf);border:1.5px solid var(--bdr);color:var(--t2);border-radius:8px;padding:7px 12px;font-size:12.5px;font-family:var(--fb);transition:border-color .15s;cursor:pointer}
.fs:focus{border-color:var(--or);outline:none}
.isi{position:relative}.isi input{padding-left:34px}.isi .ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}
/* PANEL */
.pov{position:fixed;inset:0;z-index:100;display:flex}
.pbk{flex:1;background:#00000038;backdrop-filter:blur(3px)}
.pan{width:700px;max-width:96vw;background:var(--surf);border-left:2px solid var(--bdr);height:100vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:-8px 0 32px #00000015}
.phd{padding:22px 24px;border-bottom:1px solid var(--bdr);display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.psb{padding:12px 24px;border-bottom:1px solid var(--bdr);background:var(--bg);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.stb{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;font-size:11.5px;font-weight:600;cursor:pointer;transition:all .15s;background:#fff;border:1.5px solid var(--bdr);color:var(--t3)}
.stb.ast{border-color:currentColor}
.stb.aw:hover{border-color:var(--or);color:var(--or)}
.stb.dis{opacity:.3;cursor:not-allowed}
.ssep{width:16px;height:1.5px;background:var(--bdr);flex-shrink:0}
.ptb{display:flex;border-bottom:1px solid var(--bdr);padding:0 24px}
.pt{padding:12px 16px;font-size:13px;font-weight:600;border-bottom:2.5px solid transparent;color:var(--t3);cursor:pointer;transition:all .15s}
.pt.at{border-color:var(--or);color:var(--or)}
.pt:hover{color:var(--t1)}
.pb{flex:1;overflow-y:auto;padding:24px}
.tcn{display:inline-flex;background:var(--bg);color:var(--t3);font-size:10px;padding:1px 7px;border-radius:20px;margin-left:6px;border:1px solid var(--bdr)}
/* DETAIL */
.dgr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dfl{background:var(--bg);border:1px solid var(--bdr);border-radius:10px;padding:13px 15px}
.dfl label{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px}
/* DIRECTION BADGE */
.dir-ms{background:#e0f2fe;color:#0369a1;border:1px solid #bae6fd;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:6px}
.dir-em{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:6px}
.dir-no{background:var(--bg);color:var(--t3);border:1px solid var(--bdr);padding:5px 12px;border-radius:8px;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:6px}
/* ATTACHMENTS */
.ati{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg);border:1.5px solid var(--bdr);border-radius:10px;margin-bottom:8px}
.aic{width:36px;height:36px;background:var(--or-dim);border:1px solid var(--or-bdr);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--or)}
.uz{border:2px dashed var(--bdr2);border-radius:14px;padding:32px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:16px}
.uz:hover{border-color:var(--or);background:var(--or-dim)}
/* AUDIT */
.aui{display:flex;gap:12px;padding-bottom:14px;border-bottom:1px solid var(--bdr);margin-bottom:14px}
.aui:last-child{border:none;margin:0;padding:0}
/* PROJECTS */
.pgr{display:grid;grid-template-columns:1fr;gap:20px;max-width:100%}
.pc{background:var(--surf);border:1.5px solid var(--bdr);border-radius:18px;padding:22px 28px;transition:all .2s;box-shadow:0 1px 4px #0000000a}
.pc:hover{border-color:var(--or);box-shadow:0 4px 16px #f5a62318;transform:translateY(-1px)}
.pco{font-family:var(--fm);font-size:11px;color:var(--or);background:var(--or-dim);padding:3px 9px;border-radius:5px;display:inline-block;border:1px solid var(--or-bdr)}
.pnm{font-family:var(--fd);font-size:16px;font-weight:700;margin-top:8px;margin-bottom:3px;line-height:1.3}
.prb{height:5px;background:var(--bg);border-radius:3px;overflow:hidden;margin:8px 0 5px}
.prf{height:100%;background:var(--or);border-radius:3px;transition:width .6s}
.avst{display:flex}.avst .av{margin-left:-8px;border:2px solid #fff}.avst .av:first-child{margin-left:0}
/* LCS */
.lph{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
.phc{border:1.5px solid var(--bdr);border-radius:11px;padding:11px 12px;background:var(--surf);transition:border-color .15s}
.phc:hover{border-color:var(--or)}
.phc.dph{background:#f0fdf4;border-color:#bbf7d0}
.phc.iph{background:#fffbeb;border-color:#fde68a}
.phn{font-family:var(--fm);font-size:10px;font-weight:700;color:var(--t3);margin-bottom:3px}
.phnm{font-size:12px;font-weight:600;line-height:1.3;margin-bottom:6px}
.phi{border:1px solid var(--bdr);border-radius:6px;padding:4px 8px;font-size:11px;font-family:var(--fm);color:var(--t2);background:#fff;cursor:pointer;width:100%;margin-top:3px;transition:border-color .15s;font-family:var(--fb)}
.phi:focus{border-color:var(--or);outline:none}
/* USERS */
.utb{width:100%;border-collapse:collapse}
.utb th{text-align:left;padding:11px 16px;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;border-bottom:1.5px solid var(--bdr);background:var(--bg)}
.utb td{padding:12px 16px;border-bottom:1px solid var(--bdr);vertical-align:middle}
.utb tr:last-child td{border:none}
.utb tr:hover td{background:var(--bg)}
/* TASK TYPES */
.ttgr{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.ttc{background:var(--surf);border:1.5px solid var(--bdr);border-radius:14px;padding:20px;transition:all .15s;box-shadow:0 1px 3px #0000000a}
.ttc:hover{border-color:var(--or)}
.ttc.inac{opacity:.5}
/* MODAL */
.mov{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;background:#00000055;backdrop-filter:blur(5px)}
.mod{background:var(--surf);border:1.5px solid var(--bdr);border-radius:20px;width:100%;max-width:560px;max-height:92vh;overflow:hidden;box-shadow:0 20px 60px #00000025;display:flex;flex-direction:column}
.mhd{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.mtl{font-family:var(--fd);font-size:17px;font-weight:800}
.mbd{padding:24px;overflow-y:auto;flex:1}
.fgr{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.frw{margin-bottom:14px}
.ibx{background:#fffbeb;border:1px solid #fde68a;border-radius:9px;padding:10px 13px;display:flex;align-items:flex-start;gap:8px;font-size:12px;color:#92400e}
/* LOGIN */
.lbg{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}
.lc{background:var(--surf);border:1.5px solid var(--bdr);border-radius:24px;padding:40px;width:100%;max-width:440px;box-shadow:0 4px 24px #0000000f}
.llg{text-align:center;margin-bottom:28px}
.liw{display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.lti{font-family:var(--fd);font-size:22px;font-weight:800}
.lsu{font-size:13px;color:var(--t3);margin-top:4px}
.dgd{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.dbt{background:var(--bg);border:1.5px solid var(--bdr);border-radius:9px;padding:10px 13px;text-align:left;cursor:pointer;transition:all .15s;font-family:var(--fb)}
.dbt:hover{border-color:var(--or);background:var(--or-dim)}
.dlb{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:2px}
.dun{font-family:var(--fm);font-size:12.5px;font-weight:500}
.eb{background:#fef2f2;border:1.5px solid #fecaca;border-radius:9px;padding:10px 13px;display:flex;align-items:center;gap:8px;color:#dc2626;font-size:13px;font-weight:500;margin-bottom:14px}
.pw{position:relative}
.pt2{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--t3);cursor:pointer;background:none;border:none;display:flex}
.pt2:hover{color:var(--t2)}
.dv{height:1.5px;background:var(--bdr);margin:20px 0}
/* 2-col */
.d2c{display:grid;grid-template-columns:1fr 310px;gap:20px}
/* DAILY COMMENT MODAL */
.dc-banner{background:linear-gradient(135deg,#fff7ed,#fef3c7);border:2px solid var(--or);border-radius:14px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:flex-start;gap:14px}
.dc-icon{font-size:28px;flex-shrink:0}
.direction-pick{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px}
.dp-opt{border:2px solid var(--bdr);border-radius:12px;padding:12px;text-align:center;cursor:pointer;transition:all .15s;background:#fff}
.dp-opt:hover{border-color:var(--or);background:var(--or-dim)}
.dp-opt.sel-d{border-color:var(--or);background:var(--or-dim)}
.dp-opt .dp-ico{font-size:24px;margin-bottom:6px}
.dp-opt .dp-lbl{font-size:12px;font-weight:700;color:var(--t1)}
.dp-opt .dp-sub{font-size:10.5px;color:var(--t3);margin-top:2px}
@media(max-width:1100px){.d2c{grid-template-columns:1fr}}
@media(max-width:768px){
  .sidebar{position:fixed;z-index:201;transform:translateX(-100%);transition:transform .3s}
  .sidebar.op{transform:translateX(0)}
  .sgr{grid-template-columns:1fr 1fr}
  .pgr{grid-template-columns:1fr}
  .ttgr{grid-template-columns:1fr 1fr}
  .fgr{grid-template-columns:1fr}
  .pan{width:100vw}
  .sc{padding:16px}
  .ttl{max-width:180px}
  .lph{grid-template-columns:1fr}
  .direction-pick{grid-template-columns:1fr}
}
</style>

<script type="text/babel">
const {useState,useEffect,useRef,createContext,useContext}=React;

// ─── FIREBASE CONFIG ─────────────────────────────────────────────────────────
const firebaseConfig={
  apiKey:"AIzaSyAnYFqrcUYd9fE_ue1FyBZix8OiW8dUegA",
  authDomain:"ncs-tasks.firebaseapp.com",
  databaseURL:"https://ncs-tasks-default-rtdb.firebaseio.com",
  projectId:"ncs-tasks",
  storageBucket:"ncs-tasks.firebasestorage.app",
  messagingSenderId:"530424257347",
  appId:"1:530424257347:web:361b97bfc3c073377c2df6"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const auth=firebase.auth();

// Auth helpers
const authSignIn=(email,pw)=>auth.signInWithEmailAndPassword(email,pw);
const authSignUp=(email,pw)=>auth.createUserWithEmailAndPassword(email,pw);
const authSignOut=()=>auth.signOut();
const authUpdatePw=(newPw)=>auth.currentUser?auth.currentUser.updatePassword(newPw):Promise.reject('Not logged in');

// DB helpers
const dbGet=path=>db.ref(path).once('value').then(s=>s.val());
const dbSet=(path,val)=>db.ref(path).set(val);
const dbOn=(path,cb)=>{const ref=db.ref(path);ref.on('value',s=>cb(s.val()));return()=>ref.off();};
// ─────────────────────────────────────────────────────────────────────────────

// ─── DARK MODE ────────────────────────────────────────────────────────────────
const getDarkMode=()=>{try{return localStorage.getItem('ncsflow_dark')==='1';}catch{return false;}};
const setDarkMode=(v)=>{try{localStorage.setItem('ncsflow_dark',v?'1':'0');}catch{}document.body.classList.toggle('dark',v);};
// Apply on load
if(getDarkMode())document.body.classList.add('dark');

// ─── NOTIFICATION SOUNDS ─────────────────────────────────────────────────────
const playSound=(type)=>{
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    if(type==='notify'){
      o.frequency.setValueAtTime(520,ctx.currentTime);
      o.frequency.setValueAtTime(660,ctx.currentTime+0.1);
      g.gain.setValueAtTime(0.3,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);
      o.start(ctx.currentTime);o.stop(ctx.currentTime+0.4);

// Get phases for a specific dept from a project
// Helper: ensure phases is always a real array (Firebase returns objects)
const ensureArr=v=>!v?[]:Array.isArray(v)?v:Object.values(v);

const getDeptPhases=(project,deptId)=>{
  if(!project)return mkPhases();
  if(project.deptPhases&&deptId&&project.deptPhases[deptId])return ensureArr(project.deptPhases[deptId]);
  // Fallback: if old format or no deptId, try first dept or empty
  if(project.deptPhases){
    const firstKey=Object.keys(project.deptPhases)[0];
    if(firstKey)return ensureArr(project.deptPhases[firstKey]);
  }
  return mkPhases();
};

// Get overall phases (for display when no dept selected) - merge all dept phases, take max progress
const getOverallPhases=(project)=>{
  if(!project.deptPhases)return mkPhases();
  const allDepts=Object.keys(project.deptPhases);
  if(allDepts.length===0)return mkPhases();
  if(allDepts.length===1)return ensureArr(project.deptPhases[allDepts[0]]);
  // Merge: for each phase, take the most advanced status across all depts
  const STATUS_ORDER={done:3,in_progress:2,pending:1};
  return mkPhases().map(basePh=>{
    let best=basePh;
    allDepts.forEach(d=>{
      const ph=ensureArr(project.deptPhases[d]).find(p=>p.phaseId===basePh.phaseId);
      if(ph&&(STATUS_ORDER[ph.status]||0)>(STATUS_ORDER[best.status]||0))best=ph;
    });
    return best;
  });
};

// Helper: get completion % for a main phase from project phases
const getMainPhaseStatus=(projectPhases,mainPhase)=>{
  const relevant=ensureArr(projectPhases).filter(ph=>mainPhase.sub.includes(ph.phaseId));
  if(!relevant.length)return{pct:0,status:'pending'};
  const done=relevant.filter(ph=>ph.status==='done').length;
  const pct=Math.round(done/relevant.length*100);
  const hasWip=relevant.some(ph=>ph.status==='in_progress');
  const status=done===relevant.length?'done':hasWip||done>0?'in_progress':'pending';
  return{pct,status,done,total:relevant.length};
};

const MentionTextarea=({value,onChange,users,placeholder})=>{
  const [suggestions,setSuggestions]=useState([]);
  const [mentionStart,setMentionStart]=useState(-1);
  const taRef=useRef(null);

  const handleChange=e=>{
    const v=e.target.value;
    const pos=e.target.selectionStart;
    onChange(v);
    // Find @ before cursor
    const beforeCursor=v.slice(0,pos);
    const atIdx=beforeCursor.lastIndexOf('@');
    if(atIdx>=0&&(atIdx===0||/\s/.test(beforeCursor[atIdx-1]))){
      const query=beforeCursor.slice(atIdx+1).toLowerCase();
      if(query.length>=0&&!query.includes(' ')){
        const matches=users.filter(u=>u.isActive&&(
          u.fullName.toLowerCase().includes(query)||
          u.username.toLowerCase().includes(query)
        )).slice(0,5);
        setSuggestions(matches);
        setMentionStart(atIdx);
        return;
      }
    }
    setSuggestions([]);setMentionStart(-1);
  };

  const selectUser=u=>{
    const before=value.slice(0,mentionStart);
    const after=value.slice(taRef.current.selectionStart);
    const newVal=before+'@'+u.fullName+' '+after;
    onChange(newVal);
    setSuggestions([]);setMentionStart(-1);
    setTimeout(()=>{if(taRef.current){const pos=before.length+u.fullName.length+2;taRef.current.setSelectionRange(pos,pos);taRef.current.focus();}},10);
  };

  return React.createElement('div',{style:{position:'relative',flex:1}},
    React.createElement('textarea',{
      ref:taRef,
      className:'ip',rows:3,
      placeholder,value,
      onChange:handleChange,
      onKeyDown:e=>{if(e.key==='Escape'){setSuggestions([]);setMentionStart(-1);}}
    }),
    suggestions.length>0&&React.createElement('div',{style:{
      position:'absolute',bottom:'100%',left:0,right:0,
      background:'var(--surf)',border:'1.5px solid var(--bdr)',
      borderRadius:10,boxShadow:'0 4px 16px #00000018',
      zIndex:500,overflow:'hidden',marginBottom:4
    }},
      React.createElement('div',{style:{padding:'6px 10px',fontSize:10.5,fontWeight:700,color:'var(--t3)',textTransform:'uppercase',borderBottom:'1px solid var(--bdr)'}},
        '👥 Mention someone'
      ),
      suggestions.map(u=>React.createElement('div',{
        key:u.id,
        onMouseDown:e=>{e.preventDefault();selectUser(u);},
        style:{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',cursor:'pointer',transition:'background .1s'},
        onMouseEnter:e=>{e.currentTarget.style.background='var(--bg)'},
        onMouseLeave:e=>{e.currentTarget.style.background='transparent'}
      },
        React.createElement(Av,{user:u,sz:'s'}),
        React.createElement('div',null,
          React.createElement('div',{style:{fontSize:13,fontWeight:600}},u.fullName),
          React.createElement('div',{style:{fontSize:11,color:'var(--t3)'}},u.email)
        ),
        React.createElement('span',{style:{marginLeft:'auto',fontSize:10.5,color:'var(--t3)',fontFamily:'var(--fm)'}},ROLE[u.role]?.l||u.role)
      ))
    )
  );
};

// Helper: highlight @mentions in comment text
const highlightMentions=(text,users)=>{
  if(!text||!text.includes('@'))return text;
  const parts=text.split(/(@\S+(?:\s\S+)?)/g);
  return parts.map((part,i)=>{
    if(part.startsWith('@')){
      const name=part.slice(1).toLowerCase();
      const found=users.find(u=>u.fullName.toLowerCase().startsWith(name)||u.username.toLowerCase()===name);
      if(found)return React.createElement('span',{key:i,style:{background:'#f0f9ff',color:'#0369a1',fontWeight:700,borderRadius:4,padding:'0 3px'}},part);
    }
    return part;
  });
};

// PASSWORD RESET REQUESTS SCREEN (for Global Admin)
const PwResetScreen=({users,setUsers})=>{
  const [requests,setRequests]=useState([]);
  const [processed,setProcessed]=useState({});
  const [dismissed,setDismissed]=useState({});

  useEffect(()=>{
    const unsub=dbOn('ncsflow/pwResets',v=>{
      if(!v)return setRequests([]);
      const arr=Array.isArray(v)?v:Object.values(v);
      const now=new Date();
      // Auto-delete requests older than 1 hour
      arr.forEach(r=>{
        if(r&&r.requestedAt){
          const age=(now-new Date(r.requestedAt))/60000; // minutes
          if(age>60)dbSet('ncsflow/pwResets/'+r.id,null);
        }
      });
      // Show pending + done (so admin can see temp password)
      setRequests(arr.filter(r=>r&&(r.status==='pending'||r.status==='done')&&((new Date()-new Date(r.requestedAt))/60000)<=60).sort((a,b)=>new Date(b.requestedAt)-new Date(a.requestedAt)));
    });
    return unsub;
  },[]);

  const genTemp=()=>'NCS@'+Math.random().toString(36).slice(2,6).toUpperCase();

  const resetPw=(req)=>{
    const tempPw=genTemp();
    setUsers(prev=>prev.map(u=>u.id===req.userId?{...u,password:tempPw,mustChangePassword:true}:u));
    dbSet('ncsflow/pwResets/'+req.id,{...req,status:'done',resetAt:new Date().toISOString(),tempPassword:tempPw});
    setProcessed(prev=>({...prev,[req.id]:tempPw}));
  };

  const dismiss=(reqId)=>{
    setDismissed(prev=>({...prev,[reqId]:true}));
    dbSet('ncsflow/pwResets/'+reqId,null);
  };

  const visible=requests.filter(r=>!dismissed[r.id]);
  if(visible.length===0){
    return React.createElement('div',{className:'sc fi'},
      React.createElement('div',{className:'sh'},
        React.createElement('div',null,
          React.createElement('div',{className:'st'},'🔐 Password Reset Requests'),

        React.createElement('div',{style:{fontSize:40,marginBottom:12}},'🎉'),
        React.createElement('div',{style:{fontSize:15,fontWeight:700,color:'var(--t2)'}},'All clear!'),
        React.createElement('div',{style:{fontSize:13,color:'var(--t3)',marginTop:6}},'No password reset requests at this time.')
      )
    );
  }

  return React.createElement('div',{className:'sc fi'},
    React.createElement('div',{className:'sh'},
      React.createElement('div',null,
        React.createElement('div',{className:'st'},'🔐 Password Reset Requests'),
        React.createElement('div',{className:'ss'},requests.length+' pending request'+(requests.length!==1?'s':''))
      )
    ),
    visible.map(req=>{
      const done=processed[req.id]||req.tempPassword;
      return React.createElement('div',{key:req.id,className:'cd',style:{padding:'20px 24px',marginBottom:14}},
        React.createElement('div',{style:{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:16}},
          React.createElement('div',null,
            React.createElement('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:8}},
              React.createElement('div',{style:{width:40,height:40,borderRadius:'50%',background:'#f59e0b20',border:'2px solid #f59e0b40',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}},'🔐'),
              React.createElement('div',null,
                React.createElement('div',{style:{fontFamily:'var(--fd)',fontSize:15,fontWeight:700}},req.userName),
                React.createElement('div',{style:{fontSize:12.5,color:'var(--t3)'}},req.userEmail)
              )
            ),
            React.createElement('div',{style:{fontSize:12,color:'var(--t3)',display:'flex',alignItems:'center',gap:5}},
              React.createElement('span',null,'⏰'),
              'Requested: '+new Date(req.requestedAt).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})
            )
          ),
          done
            ? React.createElement('div',{style:{background:'#f0fdf4',border:'2px solid #10b981',borderRadius:12,padding:'16px 20px',minWidth:260}},
                React.createElement('div',{style:{fontSize:12,fontWeight:700,color:'#059669',marginBottom:10}},'✅ Temp Password Ready'),
                React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:10}},
                  React.createElement('div',{style:{
                    fontFamily:'var(--fm)',fontSize:20,fontWeight:900,
                    color:'#166534',background:'#bbf7d0',
                    padding:'10px 16px',borderRadius:8,letterSpacing:3,
                    flex:1,textAlign:'center',border:'2px dashed #10b981'
                  }},done),
                  React.createElement('button',{
                    onClick:()=>{
                      navigator.clipboard.writeText(done).catch(()=>{});
                      // Visual feedback
                      const btn=document.activeElement;
                      if(btn){const orig=btn.textContent;btn.textContent='✅';setTimeout(()=>{btn.textContent=orig;},1500);}

const Login=({onLogin,allUsers})=>{
  const [id,setId]=useState('');const [pw,setPw]=useState('');
  const [sp,setSp]=useState(false);const [err,setErr]=useState('');const [ld,setLd]=useState(false);
  const [showForgot,setShowForgot]=useState(false);
  const [forgotId,setForgotId]=useState('');
  const [forgotSent,setForgotSent]=useState(false);
  const [forgotErr,setForgotErr]=useState('');
  const [forgotLd,setForgotLd]=useState(false);

  const sub=e=>{
    e.preventDefault();setLd(true);setErr('');
    setTimeout(async()=>{
      const userList=(typeof allUsers!=='undefined'&&allUsers&&allUsers.length)?allUsers:USERS;
      const effectiveList=userList.length>0?userList:USERS;
      const idLower=id.toLowerCase().trim();
      const found=effectiveList.find(u=>u.isActive&&(
        u.username.toLowerCase()===idLower||
        u.email.toLowerCase()===idLower||
        u.fullName.toLowerCase()===idLower
      ));
      if(!found){setErr('User not found or inactive.');setLd(false);return;}
      // Sign in with Firebase Auth using user's email
      try{
        await authSignIn(found.email, pw);
        onLogin(found);
      }catch(firebaseErr){
        // If Firebase Auth user doesn't exist yet, create it (migration)
        if(firebaseErr.code==='auth/user-not-found'||firebaseErr.code==='auth/invalid-credential'){
          // Verify password against our stored password first
          const validPw=found.password||'password123';
          if(pw!==validPw){setErr('Wrong password.');setLd(false);return;}
          try{
            await authSignUp(found.email, pw);
            onLogin(found);
          }catch(e2){
            setErr('Auth error: '+e2.message);setLd(false);
          }
        } else if(firebaseErr.code==='auth/wrong-password'||firebaseErr.code==='auth/invalid-login-credentials'){
          setErr('Wrong password.');setLd(false);
        } else {
          setErr('Login failed: '+firebaseErr.message);setLd(false);
        }
      }
    },100);
  };

  const submitForgot=()=>{
    if(!forgotId.trim())return;
    setForgotLd(true);setForgotErr('');
    setTimeout(()=>{
      const userList=(typeof allUsers!=='undefined'&&allUsers&&allUsers.length)?allUsers:USERS;
      const idLower=forgotId.toLowerCase().trim();
      const found=userList.find(u=>u.isActive&&(
        u.username.toLowerCase()===idLower||
        u.email.toLowerCase()===idLower||
        u.fullName.toLowerCase()===idLower
      ));
      if(!found){setForgotErr('User not found.');setForgotLd(false);return;}
      // Save password reset request to Firebase
      const req={
        id:Math.random().toString(36).slice(2),
        userId:found.id,
        userName:found.fullName,
        userEmail:found.email,
        requestedAt:new Date().toISOString(),
        status:'pending'
      };
      dbSet('ncsflow/pwResets/'+req.id, req)
        .then(()=>{setForgotSent(true);setForgotLd(false);})
        .catch(()=>{setForgotErr('Failed to send request. Try again.');setForgotLd(false);});
    },800);
  };

  // Forgot Password Modal
  if(showForgot){
    return React.createElement('div',{className:'lbg'},

              React.createElement(NCSLogo,{sz:32}),

                React.createElement('div',{style:{fontFamily:'var(--fd)',fontWeight:800,fontSize:20,color:'#f5a623',lineHeight:1}},'NCS'),
                React.createElement('div',{style:{fontSize:9,color:'#94a3b8',letterSpacing:'.06em',marginTop:2}},'NEXT CONSULTING SOLUTIONS')
              )
            )

          React.createElement('div',{className:'lti',style:{fontSize:18}},'Reset Password'),
          React.createElement('div',{className:'lsu'},'Enter your username or email')
        ),
        forgotSent
          ? React.createElement('div',null,
              React.createElement('div',{style:{background:'#f0fdf4',border:'2px solid #10b981',borderRadius:14,padding:'20px',textAlign:'center',marginBottom:20}},
                React.createElement('div',{style:{fontSize:32,marginBottom:10}},'✅'),
                React.createElement('div',{style:{fontFamily:'var(--fd)',fontSize:16,fontWeight:800,color:'#059669',marginBottom:6}},'Request Sent!'),
                React.createElement('div',{style:{fontSize:13,color:'#166534',lineHeight:1.6}},'Your Global Admin has been notified. You\'ll receive a temporary password soon — check with your admin.')
              ),
              React.createElement(Btn,{v:'se',sz:'lg',ch:'← Back to Login',onClick:()=>{setShowForgot(false);setForgotSent(false);setForgotId('');}})
            )
          : React.createElement('div',null,
              forgotErr&&React.createElement('div',{className:'eb',style:{marginBottom:14}},I.alert,React.createElement('span',null,forgotErr)),
              React.createElement('div',{className:'frw',style:{marginBottom:16}},
                React.createElement(Fld,{lbl:'Email or Username',ch:
                  React.createElement('input',{className:'ip',type:'text',placeholder:'your username or email',value:forgotId,onChange:e=>setForgotId(e.target.value),autoFocus:true})
                })
              ),
              React.createElement(Btn,{v:'pr',sz:'lg',ch:forgotLd?React.createElement(React.Fragment,null,React.createElement('div',{className:'sp'}),'\u00a0Sending…'):'Send Reset Request',onClick:submitForgot,dis:!forgotId.trim()||forgotLd}),
              React.createElement('div',{style:{textAlign:'center',marginTop:14}},

    React.createElement('div',{className:'lc fi'},

const OverviewScreen=({user,setScreen,onOpenLCS,activeDept=''})=>{
  const {projects,tasks}=useCtx();

  // All visible projects
  const visProjects=[...getVisibleProjects(user,projects,activeDept)].sort((a,b)=>a.code.localeCompare(b.code));

  // For each project+dept combo, compute progress
  const getProjDeptRows=(p)=>{
    const depts=p.departments&&p.departments.length>0?p.departments:['—'];
    return depts.map(deptId=>{
      const dept=DEPARTMENTS.find(d=>d.id===deptId);
      const phs=getDeptPhases(p,deptId);
      const done=phs.filter(ph=>ph.status==='done').length;
      const total=LCS_PHASES.length;
      const pct=Math.round(done/total*100);
      // Find current phase
      const wip=phs.find(ph=>ph.status==='in_progress');
      const wipLCS=wip?LCS_PHASES.find(lp=>String(lp.id)===String(wip.phaseId)):null;
      const mainPhase=wipLCS?LCS_MAIN.find(mp=>mp.sub.includes(wipLCS.id)):null;
      const mainCols=['#6366f1','#f59e0b','#3b82f6','#ef4444','#10b981'];
      const mainCol=mainPhase?mainCols[LCS_MAIN.indexOf(mainPhase)]:'#94a3b8';
      // Days in current phase
      let daysInPhase=null;
      if(wip&&wip.completedAt===undefined){
        const sorted=[...LCS_PHASES].sort((a,b)=>a.id-b.id);
        const wipIdx=sorted.findIndex(lp=>String(lp.id)===String(wip.phaseId));
        if(wipIdx>0){
          const prev=phs.find(ph=>ph.phaseId===sorted[wipIdx-1].id);
          if(prev&&prev.completedAt)daysInPhase=Math.floor((new Date()-new Date(prev.completedAt))/86400000);
          else if(prev&&prev.completionDate)daysInPhase=Math.floor((new Date()-new Date(prev.completionDate))/86400000);
        }

      const openTasks=tasks.filter(t=>t.projectId===p.id&&t.status!=='completed'&&t.department===deptId).length;
      const overdueTasks=tasks.filter(t=>t.projectId===p.id&&t.status!=='completed'&&t.department===deptId&&t.dueDate&&new Date(t.dueDate)<new Date(new Date().setHours(0,0,0,0))).length;
      return{deptId,dept,phs,done,total,pct,wipLCS,mainPhase,mainCol,daysInPhase,openTasks,overdueTasks};
    });

  const STATUS_COL={active:'#10b981',on_hold:'#f59e0b',completed:'#6366f1',archived:'#94a3b8'};

// TICKETS MANAGEMENT SCREEN (Global Admin)
const TicketsScreen=({user,setSelTask,filter='open'})=>{
  const {tasks,setTasks,projects,users}=useCtx();
  const [fProj,setFProj]=useState('');
  const [fDept,setFDept]=useState('');
  const [reassignTarget,setReassignTarget]=useState(null); // task being reassigned
  const [newDept,setNewDept]=useState('');

  // All tickets (tasks created by support users or marked isTicket)
  const supportUsers=users.filter(u=>u.role==='support').map(u=>u.id);
  const allTickets=tasks.filter(t=>{
    const isTicket=t.isTicket||(supportUsers.includes(t.createdBy));
    if(!isTicket)return false;
    if(filter==='open')return t.status!=='completed';
    return t.status==='completed';
  });

  // Apply filters
  const filtered=allTickets.filter(t=>{
    if(fProj&&t.projectId!==fProj)return false;
    if(fDept&&t.department!==fDept)return false;
    return true;
  }).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));

  const ST_COL={to_do:'#64748b',in_progress:'#2563eb',under_review:'#d97706',completed:'#059669'};
  const ST_LBL={to_do:'Pending',in_progress:'In Progress',under_review:'Under Review',completed:'Closed'};
  const PRI_COL={1:'#94a3b8',2:'#f59e0b',3:'#ef4444',4:'#dc2626'};
  const PRI_LBL={1:'Low',2:'Medium',3:'High',4:'Critical'};

  const reassignDept=(taskId,deptId)=>{
    setTasks(prev=>prev.map(t=>t.id===taskId?{...t,department:deptId}:t));
    setReassignTarget(null);setNewDept('');
  };

  const assignTo=(taskId,userId)=>{
    setTasks(prev=>prev.map(t=>t.id===taskId?{...t,assignedTo:userId,status:userId?'in_progress':'to_do'}:t));

    filtered.length===0

            const statusCol=ST_COL[t.status]||'#64748b';

            return React.createElement('div',{key:t.id,className:'cd',style:{overflow:'hidden'}},
              // Top row
              React.createElement('div',{style:{display:'flex',gap:12,padding:'14px 18px',borderBottom:'1px solid var(--bdr)'}},
                // Left: info
                React.createElement('div',{style:{flex:1}},
                  React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:5,flexWrap:'wrap'}},
                    !t.assignedTo&&React.createElement('span',{style:{fontSize:10.5,background:'#7c3aed18',color:'#7c3aed',border:'1px solid #7c3aed30',padding:'2px 8px',borderRadius:4,fontWeight:700}},'🔔 UNASSIGNED'),
                    dept&&React.createElement('span',{style:{fontSize:11,padding:'2px 8px',borderRadius:5,background:dept.color+'18',color:dept.color,border:'1px solid '+dept.color+'30',fontWeight:600}},dept.icon+' '+dept.name),
                    p&&React.createElement('span',{className:'pco',style:{fontSize:10}},p.code),
                    React.createElement('span',{style:{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:5,background:statusCol+'15',color:statusCol,border:'1px solid '+statusCol+'30'}},ST_LBL[t.status]||t.status),
                    React.createElement('span',{style:{fontSize:11,fontWeight:700,color:PRI_COL[t.priority]}},PRI_LBL[t.priority]||'')
                  ),
                  React.createElement('div',{style:{fontFamily:'var(--fd)',fontSize:15,fontWeight:700,color:'var(--t1)',marginBottom:4}},t.title),
                  t.description&&React.createElement('div',{style:{fontSize:12.5,color:'var(--t3)',marginBottom:4}},t.description.slice(0,120)+(t.description.length>120?'…':'')),

                    )

                // Right: actions
                React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:8,alignItems:'flex-end',minWidth:160}},
                  // Assign to
                  React.createElement('div',{style:{display:'flex',alignItems:'center',gap:6}},
                    React.createElement('span',{style:{fontSize:11,color:'var(--t3)'}},'Assign:'),
                    React.createElement('select',{

                  // View task button

                  },'View Details →')

              // Reassign dept row

// APP
// Sanitize: Firebase rejects undefined — convert all to null recursively
const sanitize=(obj)=>{
  if(obj===undefined)return null;
  if(obj===null||typeof obj!=='object')return obj;
  if(Array.isArray(obj))return obj.map(sanitize);
  const out={};
  Object.keys(obj).forEach(k=>{const v=sanitize(obj[k]);out[k]=v===undefined?null:v;});
  return out;
};

const App=()=>{
  // Restore user from sessionStorage (survives tab duplicate & refresh)
  const [user,setUserRaw]=useState(()=>{
    try{const s=sessionStorage.getItem('ncsflow_user');return s?JSON.parse(s):null;}catch{return null;}
  });
  const setUser=u=>{
    setUserRaw(u);
    try{if(u)sessionStorage.setItem('ncsflow_user',JSON.stringify(u));else sessionStorage.removeItem('ncsflow_user');}catch{}
  };
  const [screen,setScreen]=useState('dashboard');
  const [selTask,setSelTask]=useState(null);
  const [projFilter,setProjFilter]=useState('');
  const [ovLCS,setOvLCS]=useState(null);
  const [activeDept,setActiveDept]=useState('');
  const [sbOpen,setSbOpen]=useState(false);
  // ── Firebase realtime sync ──────────────────────────────────────────────────
  const [tasks,setTasksRaw]=useState([]);
  const [projects,setProjectsRaw]=useState([]);
  const [users,setUsersRaw]=useState([]);
  const [taskTypes,setTaskTypesRaw]=useState(TASK_TYPES_DEFAULT);
  const [dbReady,setDbReady]=useState(false);
  const dbReadyRef=useRef(false);

  // Save helpers → write to Firebase ONLY after initial load
  const saveFB=(key,val)=>{if(dbReadyRef.current)dbSet('ncsflow/'+key,val?sanitize(val):null);};

  // Setters: update state + push to Firebase
  const setTasks=v=>setTasksRaw(prev=>{const next=typeof v==='function'?v(prev):v;saveFB('tasks',next);return next;});
  const setProjects=v=>setProjectsRaw(prev=>{const next=typeof v==='function'?v(prev):v;saveFB('projects',next);return next;});
  const setUsers=v=>setUsersRaw(prev=>{const next=typeof v==='function'?v(prev):v;saveFB('users',next);return next;});
  const setTaskTypes=v=>setTaskTypesRaw(prev=>{const next=typeof v==='function'?v(prev):v;saveFB('tasktypes',next);return next;});
  const ctx={tasks,setTasks,projects,setProjects,users,setUsers,taskTypes,setTaskTypes};

  // Load all data from Firebase on mount — realtime listeners
  useEffect(()=>{
    const unsubs=[];
    // Always mark dbReady after first response from Firebase (even if null/empty)
    unsubs.push(dbOn('ncsflow/tasks',   v=>{setTasksRaw(v?( Array.isArray(v)?v:Object.values(v) ):[]);dbReadyRef.current=true;setDbReady(true);}));
    unsubs.push(dbOn('ncsflow/projects',v=>{setProjectsRaw(v?(Array.isArray(v)?v:Object.values(v)):[]);}));
    unsubs.push(dbOn('ncsflow/users',   v=>{setUsersRaw(v?(Array.isArray(v)?v:Object.values(v)):[]);}));
    unsubs.push(dbOn('ncsflow/tasktypes',v=>{if(v)setTaskTypesRaw(Array.isArray(v)?v:Object.values(v));}));
    // Safety: mark ready after 5s even if Firebase is slow
    const timeout=setTimeout(()=>{dbReadyRef.current=true;setDbReady(true);},5000);
    return()=>{unsubs.forEach(u=>u());clearTimeout(timeout);};
  },[]);

  // When users load from Firebase, refresh the logged-in user's data (MUST be before any if/return)
  useEffect(()=>{
    if(user&&users.length>0){
      const fresh=users.find(u=>u.id===user.id);
      if(fresh&&JSON.stringify(fresh)!==JSON.stringify(user))setUser(fresh);
      else if(!fresh)setUser(null);
    }
  },[users]);

  // Show loading while Firebase connects
  if(!dbReady)return React.createElement('div',{style:{
    minHeight:'100vh',background:'var(--bg)',display:'flex',alignItems:'center',
    justifyContent:'center',flexDirection:'column',gap:16
  }},
    React.createElement('div',{style:{background:'var(--dk)',padding:'14px 20px',borderRadius:16,display:'flex',alignItems:'center',gap:12}},
      React.createElement(NCSLogo,{sz:28}),
      React.createElement('div',{style:{fontFamily:'var(--fd)',fontWeight:800,fontSize:18,color:'#f5a623'}},'NCS Flow')
    ),
    React.createElement('div',{className:'sp',style:{width:28,height:28,borderWidth:3}}),
    React.createElement('div',{style:{fontSize:13,color:'var(--t3)',fontWeight:500}},'Connecting to database...')
  );

  // First time setup — no users at all
  if(users.length===0){
    return React.createElement(Ctx.Provider,{value:ctx},
      React.createElement(SetupWizard,{onSetup:adminUser=>{
        const newUsers=[adminUser];
        setUsers(newUsers);
        setUser(adminUser);
        setScreen('dashboard');
      }})
    );
  }

  if(!user)return React.createElement(Ctx.Provider,{value:ctx},React.createElement(Login,{onLogin:u=>{
    setUser(u);
    setScreen(u.role==='support'?'support':'dashboard');
    if(u.role!=='global_admin'&&u.departments&&u.departments.length>0){
      setActiveDept(u.departments[0]);
    }
  },allUsers:users}));

  // Force password change if user has mustChangePassword flag
  if(user.mustChangePassword){
    return React.createElement(Ctx.Provider,{value:ctx},
      React.createElement('div',{className:'lbg'},
        React.createElement('div',{className:'lc fi',style:{maxWidth:420}},
          React.createElement('div',{className:'llg'},
            React.createElement('div',{className:'liw'},
              React.createElement('div',{style:{background:'var(--dk)',padding:'10px 16px',borderRadius:14,display:'flex',alignItems:'center',gap:12}},
                React.createElement(NCSLogo,{sz:32}),
                React.createElement('div',{style:{borderLeft:'2px solid #f5a62335',paddingLeft:12}},
                  React.createElement('div',{style:{fontFamily:'var(--fd)',fontWeight:800,fontSize:20,color:'#f5a623'}},  'NCS'),
                  React.createElement('div',{style:{fontSize:9,color:'#94a3b8',letterSpacing:'.06em',marginTop:2}},'NEXT CONSULTING SOLUTIONS')
                )
              )
            ),
            React.createElement('div',{className:'lti',style:{fontSize:18}},'Set New Password'),
            React.createElement('div',{className:'lsu'},'You must change your temporary password to continue')
          ),
          React.createElement(ForceChangePassword,{
            user,
            onChanged:(newPw)=>{
              const updated={...user,password:newPw,mustChangePassword:false};
              setUsers(prev=>prev.map(u=>u.id===user.id?updated:u));
              setUser(updated);
            },
            onLogout:()=>{setUser(null);}
          })
        )
      )
    );
  }
  const screenMap={
    dashboard:()=>React.createElement(Dashboard,{user,setScreen,setSelTask,activeDept}),
    tasks:()=>React.createElement(Tasks,{user,selTask,setSelTask,initialProjFilter:projFilter,clearProjFilter:()=>setProjFilter(''),activeDept}),
    projects:()=>React.createElement(Projects,{user,setScreen,onViewTasks:(projId)=>{setProjFilter(projId);setScreen('tasks');},activeDept}),
    completed:()=>React.createElement(CompletedScreen,{user,activeDept}),
    overview:()=>user.role==='global_admin'?React.createElement(OverviewScreen,{user,setScreen,onOpenLCS:p=>{setOvLCS(p);},activeDept}):React.createElement('div',null),
    newproject:()=>user.role==='global_admin'?React.createElement(NewProjectScreen,{user,setScreen,activeDept}):null,
    support:()=>React.createElement(SupportSubmitScreen,{user,activeDept}),
    tickets_open:()=>user.role==='global_admin'?React.createElement(TicketsScreen,{user,setSelTask,filter:'open'}):null,
    tickets_done:()=>user.role==='global_admin'?React.createElement(TicketsScreen,{user,setSelTask,filter:'done'}):null,
    mytickets:()=>React.createElement(MyTicketsScreen,{user,setSelTask,activeDept:user.role==='support'?'':activeDept}),
    deptoverview:()=>React.createElement(DeptOverviewScreen,{user,setScreen,onOpenLCS:p=>{setOvLCS(p);},activeDept}),
    config:()=>user.role==='global_admin'?React.createElement(Config,{user}):null,
    users:()=>user.role==='global_admin'?React.createElement(Users,{curUser:user}):null,
    pwresets:()=>user.role==='global_admin'?React.createElement(PwResetScreen,{users,setUsers}):null,
  };
  const screens={};
  return React.createElement(Ctx.Provider,{value:ctx},
    React.createElement(React.Fragment,null,
    ovLCS&&React.createElement(LCSPanel,{project:ovLCS,onClose:()=>setOvLCS(null),isAdmin:user.role==='global_admin'||user.role==='admin',currentUser:user,activeDept:ovLCS._viewDept||activeDept,onUpdate:u=>{const{_viewDept,...clean}=u;setProjects(prev=>prev.map(p=>p.id===clean.id?clean:p));setOvLCS(null);}}),
    React.createElement('div',{className:'app'},
      React.createElement(Sidebar,{screen,setScreen:s=>{setScreen(s);setSelTask(null)},user,onLogout:()=>{authSignOut();setUser(null);setScreen('dashboard');setActiveDept('');},open:sbOpen,setOpen:setSbOpen,activeDept,setActiveDept}),
      React.createElement('div',{className:'main'},
        React.createElement(Topbar,{user,onMenu:()=>setSbOpen(v=>!v),activeDept}),
        (screenMap[screen]||screenMap.dashboard)()
      )
    )
  ));
};
// Error boundary
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={error:null};}
  static getDerivedStateFromError(e){return{error:e.message};}
  render(){
    if(this.state.error)return React.createElement('div',{style:{padding:40,fontFamily:'monospace',color:'#dc2626',background:'#fef2f2',minHeight:'100vh'}},
      React.createElement('h2',{style:{marginBottom:16}},'⚠️ App Error'),
      React.createElement('pre',{style:{background:'#fff',padding:16,borderRadius:8,fontSize:13,overflow:'auto'}},this.state.error),
      React.createElement('button',{onClick:()=>this.setState({error:null}),style:{marginTop:16,padding:'8px 20px',background:'#dc2626',color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontSize:14}},'Try Again')
    );
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ErrorBoundary,null,React.createElement(App,null)));
</script>
